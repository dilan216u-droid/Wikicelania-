<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elecciones presidenciales de Celania de 2019 - WikiCelania</title>
    <style>
        /* CORE VECTOR WIKIPEDIA */
        :root {
            --bg-main: #f8f9fa;
            --bg-content: #ffffff;
            --text-color: #202122;
            --text-muted: #54595d;
            --link-color: #3366cc;
            --border-wiki: #a2a9b1;
            --border-sub: #eaecf0;
            --infobox-header: #eaecf0;
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Lato, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            font-size: 14px;
        }

        /* NAVBAR */
        header {
            background-color: var(--bg-content);
            border-bottom: 1px solid var(--border-wiki);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-brand { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .header-brand h1 { margin: 0; font-size: 20px; font-family: 'Linux Libertine', 'Georgia', serif; font-weight: normal; }
        .search-box input { border: 1px solid var(--border-wiki); padding: 6px 12px; font-size: 13px; background-color: var(--bg-main); border-radius: 2px; width: 200px; }

        /* CONTENT LAYOUT */
        .container { max-width: 1300px; margin: 0 auto; display: flex; flex-direction: column; }
        @media (min-width: 768px) { .container { flex-direction: row; } }

        .sidebar { width: 100%; background: var(--bg-main); padding: 20px 15px; border-bottom: 1px solid var(--border-wiki); }
        @media (min-width: 768px) { .sidebar { width: 180px; min-width: 180px; border-bottom: none; } }
        .sidebar ul { list-style: none; padding: 0; margin: 0; }
        .sidebar li { margin-bottom: 8px; font-size: 13px; }
        .sidebar a { color: var(--link-color); text-decoration: none; }
        .sidebar a:hover { text-decoration: underline; }

        main { flex: 1; background: var(--bg-content); padding: 24px 20px; border-left: 1px solid var(--border-wiki); min-width: 0; }
        .article-title { font-family: 'Linux Libertine', 'Georgia', serif; font-size: 30px; font-weight: normal; border-bottom: 1px solid var(--border-wiki); padding-bottom: 3px; margin-top: 0; margin-bottom: 5px; }
        .article-subtitle { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; }

        .content-layout { display: flex; flex-direction: column-reverse; gap: 20px; }
        @media (min-width: 992px) {
            .content-layout { flex-direction: row; }
            .body-text { flex: 3; }
            .infobox { flex: 1; min-width: 330px; max-width: 330px; }
        }

        p { margin: 0 0 16px 0; text-align: justify; }
        h2 { font-family: 'Linux Libertine', 'Georgia', serif; font-weight: normal; font-size: 22px; border-bottom: 1px solid var(--border-wiki); padding-bottom: 4px; margin-top: 32px; margin-bottom: 12px; }

        /* TRUE WIKIPEDIA ELECTION INFOBOX */
        .infobox { background: #f8f9fa; border: 1px solid var(--border-wiki); padding: 3px; font-size: 12px; height: fit-content; width: 100%; }
        .infobox-nav { display: flex; justify-content: space-between; align-items: center; font-size: 11px; padding: 4px 5px; border-bottom: 1px solid var(--border-wiki); }
        .infobox-flag { width: 34px; height: 22px; border: 1px solid var(--border-wiki); }
        .infobox-title { text-align: center; font-size: 15px; font-weight: bold; padding: 8px 0 4px 0; font-family: sans-serif; }
        .infobox-subtitle { text-align: center; font-size: 12px; margin-bottom: 8px; color: var(--text-muted); }
        
        .infobox-table { width: 100%; border-collapse: collapse; }
        .infobox-table td { padding: 4px; vertical-align: middle; }
        .infobox-label { font-weight: bold; text-align: left; }
        .infobox-data { text-align: right; }
        .infobox-section-title { text-align: center; font-weight: bold; padding: 6px 0; border-top: 1px solid var(--border-wiki); background: #eaecf0; margin-top: 5px; }

        /* CANDIDATES GRID (ESTILO WIKIPEDIA HORIZONTAL) */
        .candidates-table { width: 100%; border-collapse: collapse; margin-top: 4px; table-layout: fixed; }
        .candidates-table td { text-align: center; vertical-align: top; padding: 4px 2px; font-size: 11px; }
        
        .cand-color-line { height: 6px; width: 100%; margin-bottom: 4px; }
        .cand-photo { width: 75px; height: 90px; border: 1px solid var(--border-wiki); object-fit: cover; margin: 0 auto 4px auto; display: block; }
        .cand-name { font-weight: bold; font-size: 12px; line-height: 1.2; display: block; margin-bottom: 2px; }
        .cand-name a { color: var(--link-color); text-decoration: none; }
        .cand-party { color: var(--text-muted); font-size: 10px; display: block; min-height: 24px; }
        
        .cand-votes { font-size: 11px; display: block; margin-top: 4px; }
        .cand-percent { font-size: 13px; font-weight: bold; display: block; margin-bottom: 4px; }

        /* MINI BARRAS DE PORCENTAJE SIMÉTRICAS */
        .cand-bar-container { width: 90%; height: 14px; background-color: #eee; border: 1px solid #aaa; margin: 2px auto; }
        .cand-bar { height: 100%; width: 100%; }

        /* LEYENDA Y MAPA */
        .wiki-map-legend { display: flex; justify-content: space-around; padding: 6px; background: #fff; border: 1px solid var(--border-sub); font-size: 11px; margin-top: 4px; }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .color-box { width: 12px; height: 12px; border: 1px solid #000; }

        .footer-transition-wiki { width: 100%; border-collapse: collapse; margin-top: 8px; border: 1px solid var(--border-wiki); font-size: 11px; }
        .footer-transition-wiki th { background: #eaecf0; padding: 4px; border-bottom: 1px solid var(--border-wiki); text-align: center; }
    </style>
</head>

        </div>
        <div class="search-box">
