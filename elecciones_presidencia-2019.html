<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elecciones presidenciales de Celania de 2019 - WikiCelania</title>
    <style>
        /* VARIABLES DE DISEÑO WIKIPEDIA VECTOR 2022 */
        :root {
            --bg-main: #f8f9fa;
            --bg-content: #ffffff;
            --text-color: #202122;
            --text-muted: #54595d;
            --link-color: #3366cc;
            --link-hover: #447ff5;
            --border-wiki: #a2a9b1;
            --border-sub: #eaecf0;
            --infobox-header: #eaecf0;
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Lato, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            font-size: 14px;
        }

        /* CABECERA */
        header {
            background-color: var(--bg-content);
            border-bottom: 1px solid var(--border-wiki);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-brand { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .header-brand h1 { margin: 0; font-size: 20px; font-family: 'Linux Libertine', 'Georgia', serif; font-weight: normal; }
        .search-box input { border: 1px solid var(--border-wiki); padding: 6px 12px; font-size: 13px; background-color: var(--bg-main); border-radius: 2px; width: 240px; }

        /* CONTENEDOR PRINCIPAL */
        .container { max-width: 1300px; margin: 0 auto; display: flex; flex-direction: column; }
        @media (min-width: 768px) { .container { flex-direction: row; } }

        /* MENÚ LATERAL */
        .sidebar { width: 100%; background: var(--bg-main); padding: 20px 15px; border-bottom: 1px solid var(--border-wiki); }
        @media (min-width: 768px) { .sidebar { width: 180px; min-width: 180px; border-bottom: none; } }
        .sidebar ul { list-style: none; padding: 0; margin: 0; }
        .sidebar li { margin-bottom: 8px; font-size: 13px; }
        .sidebar a { color: var(--link-color); text-decoration: none; }
        .sidebar a:hover { text-decoration: underline; }

        /* ARTÍCULO PRINCIPAL */
        main { flex: 1; background: var(--bg-content); padding: 24px 30px; border-left: 1px solid var(--border-wiki); min-width: 0; }
        .article-title { font-family: 'Linux Libertine', 'Georgia', serif; font-size: 30px; font-weight: normal; border-bottom: 1px solid var(--border-wiki); padding-bottom: 3px; margin-top: 0; margin-bottom: 5px; }
        .article-subtitle { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; }

        .content-layout { display: flex; flex-direction: column-reverse; gap: 25px; }
        @media (min-width: 992px) {
            .content-layout { flex-direction: row; }
            .body-text { flex: 3; }
            .infobox { flex: 1; min-width: 320px; max-width: 320px; }
        }

        p { margin: 0 0 16px 0; text-align: justify; }
        h2 { font-family: 'Linux Libertine', 'Georgia', serif; font-weight: normal; font-size: 22px; border-bottom: 1px solid var(--border-wiki); padding-bottom: 4px; margin-top: 32px; margin-bottom: 12px; }
        
        /* INFOBOX ESTILO WIKIPEDIA ELECCIONES */
        .infobox { background: #f8f9fa; border: 1px solid var(--border-wiki); padding: 5px; font-size: 13px; height: fit-content; }
        .infobox-nav { display: flex; justify-content: space-between; align-items: center; font-size: 11px; padding: 4px 5px; border-bottom: 1px solid var(--border-wiki); margin-bottom: 5px; }
        .infobox-nav a { color: var(--link-color); text-decoration: none; }
        .infobox-flag { width: 34px; height: 22px; border: 1px solid var(--border-wiki); object-fit: cover; }
        .infobox-title { text-align: center; font-size: 15px; font-weight: bold; padding: 6px 0; line-height: 1.3; }
        .infobox-subtitle { text-align: center; font-size: 12px; margin-bottom: 10px; color: var(--text-muted); }
        .infobox-subtitle a { color: var(--link-color); text-decoration: none; }
        .infobox-section-title { text-align: center; font-weight: bold; font-size: 13px; padding: 6px 0 4px 0; border-top: 1px solid var(--border-wiki); margin-top: 8px; }
        .infobox-header-box { background-color: var(--infobox-header); text-align: center; font-weight: bold; font-size: 13px; padding: 4px; border: 1px solid var(--border-wiki); margin: 10px 0 5px 0; }
        
        .infobox-table { width: 100%; border-collapse: collapse; }
        .infobox-table td { padding: 4px 5px; vertical-align: middle; }
        .infobox-label { font-weight: bold; text-align: left; }
        .infobox-data { text-align: right; }
        .infobox-label-secondary { padding-left: 12px !important; color: #404040; }
        .infobox-data-secondary { text-align: right; color: #404040; }

        /* BARRAS Y BLOQUES DE CANDIDATOS */
        .party-line { height: 4px; width: 100%; margin-top: 8px; display: block; }
        .candidato-block { padding: 6px 5px; background: #fff; border: 1px solid var(--border-sub); margin-bottom: 2px; }
        .candidato-title-row { font-size: 13px; margin-bottom: 2px; }
        .candidato-name { font-weight: bold; }
        .candidato-party { font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
        .candidato-layout { display: flex; gap: 12px; align-items: center; }
        .candidato-img-wrapper { width: 65px; height: 75px; border: 1px solid var(--border-wiki); overflow: hidden; flex-shrink: 0; }
        .candidato-img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .candidato-stats { flex: 1; display: flex; flex-direction: column; font-size: 13px; }
        .stats-votos-row { display: flex; justify-content: space-between; }
        
        .progress-bar-container { width: 100%; height: 16px; background-color: var(--border-sub); border: 1px solid var(--border-wiki); margin-top: 4px; position: relative; }
        .progress-bar { height: 100%; }
        .progress-text { position: absolute; right: 4px; top: 0; font-size: 11px; font-weight: bold; color: #000; line-height: 14px; }

        /* LEYENDA Y MAPA */
        .wiki-map-legend-container { display: flex; justify-content: space-between; padding: 6px 5px; background: #fff; border: 1px solid var(--border-sub); margin-top: 4px; }
        .wiki-map-color-box { padding: 1px 6px; border: 1px solid #202122; font-weight: bold; margin-right: 5px; color: #fff; font-size: 11px; }

        /* FOOTER DE TRANSICIÓN */
        .footer-transition-wiki { width: 100%; border-collapse: collapse; margin-top: 12px; border: 1px solid var(--border-wiki); background: #ffffff; }
        .footer-transition-wiki th { background-color: var(--infobox-header); padding: 6px; font-size: 12px; border-bottom: 1px solid var(--border-wiki); text-align: center; }
        .footer-transition-wiki td { width: 50%; padding: 6px; font-size: 12px; }
    </style>
</head>

            <h1>WikiCelania</h1>
        </div>
        <div class="search-box">
            <input type="text" placeholder="Buscar en WikiCelania">
