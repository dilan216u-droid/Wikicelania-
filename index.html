<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>República de Celania - Wikipedia, la enciclopedia libre</title>
    <style>
        /* VARIABLES DE DISEÑO (Estilo Wikipedia Vector 2022) */
        :root {
            --bg-main: #f8f9fa;
            --bg-content: #ffffff;
            --text-color: #202122;
            --text-muted: #54595d;
            --link-color: #3366cc;
            --link-hover: #447ff5;
            --border-wiki: #a2a9b1;
            --border-sub: #eaecf0;
            --infobox-header: #cedff2;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Lato, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            font-size: 14px;
        }

        /* BARRA DE NAVEGACIÓN SUPERIOR PROFESIONAL */
        header {
            background-color: var(--bg-content);
            border-bottom: 1px solid var(--border-wiki);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-brand img {
            height: 32px;
            width: auto;
        }

        header h1 {
            margin: 0;
            font-size: 20px;
            font-family: 'Linux Libertine', 'Georgia', serif;
            font-weight: normal;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            border: 1px solid var(--border-wiki);
            padding: 6px 12px;
            font-size: 13px;
            background-color: var(--bg-main);
            border-radius: 2px;
            width: 240px;
            transition: all 0.2s;
        }

        .search-box input:focus {
            outline: none;
            background-color: var(--bg-content);
            border-color: var(--link-color);
            box-shadow: inset 0 0 0 1px var(--link-color);
        }

        /* CONTENEDOR PRINCIPAL FLEXIBLE Y RESPONSIVE */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 768px) {
            .container {
                flex-direction: row;
            }
        }

        /* MENÚ LATERAL TIPO WIKIPEDIA */
        .sidebar {
            width: 100%;
            background: var(--bg-main);
            padding: 20px 15px;
            border-bottom: 1px solid var(--border-wiki);
        }

        @media (min-width: 768px) {
            .sidebar {
                width: 180px;
                min-width: 180px;
                border-bottom: none;
                border-right: 1px solid transparent;
            }
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sidebar li {
            margin-bottom: 8px;
            font-size: 13px;
        }

        .sidebar a {
            color: var(--link-color);
            text-decoration: none;
        }

        .sidebar a:hover {
            text-decoration: underline;
        }

        /* ARTÍCULO PRINCIPAL */
        main {
            flex: 1;
            background: var(--bg-content);
            padding: 24px 30px;
            border-left: 1px solid var(--border-wiki);
            min-width: 0;
        }

        .article-title {
            font-family: 'Linux Libertine', 'Georgia', serif;
            font-size: 32px;
            font-weight: normal;
            border-bottom: 1px solid var(--border-wiki);
            padding-bottom: 3px;
            margin-top: 0;
            margin-bottom: 5px;
        }

        .article-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .content-layout {
            display: flex;
            flex-direction: column-reverse;
            gap: 25px;
        }

        @media (min-width: 992px) {
            .content-layout {
                flex-direction: row;
            }
            .body-text {
                flex: 3;
            }
            .infobox {
                flex: 1;
                min-width: 330px;
                max-width: 330px;
            }
        }

        p {
            margin: 0 0 16px 0;
            text-align: justify;
        }

        a {
            color: var(--link-color);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        h2 {
            font-family: 'Linux Libertine', 'Georgia', serif;
            font-weight: normal;
            font-size: 22px;
            border-bottom: 1px solid var(--border-wiki);
            padding-bottom: 4px;
            margin-top: 32px;
            margin-bottom: 12px;
        }

        h3 {
            font-size: 17px;
            font-weight: bold;
            margin-top: 24px;
            margin-bottom: 8px;
        }

        .toc {
            background: var(--bg-main);
            border: 1px solid var(--border-wiki);
            padding: 12px 20px 12px 12px;
            display: inline-block;
            margin: 15px 0 25px 0;
            font-size: 13px;
        }

        .toc-title {
            font-weight: bold;
            text-align: center;
            margin-bottom: 8px;
        }

        .toc ul {
            list-style: none;
            padding-left: 0;
            margin: 0;
        }

        .toc ul ul {
            padding-left: 20px;
        }

        .toc-number {
            color: var(--text-color);
            margin-right: 4px;
        }

        .infobox {
            background: var(--bg-main);
            border: 1px solid var(--border-wiki);
            padding: 3px;
            font-size: 12px;
            height: fit-content;
            align-self: flex-start;
        }

        .infobox-title {
            text-align: center;
            font-size: 15px;
            font-weight: bold;
            background-color: var(--infobox-header);
            padding: 8px;
            margin-bottom: 4px;
        }

        .infobox-media {
            text-align: center;
            background: #fff;
            border: 1px solid var(--border-sub);
            padding: 8px;
            margin-bottom: 6px;
        }

        .infobox-media img {
            max-width: 100%;
            height: auto;
        }

        .infobox-caption {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .infobox-header {
            background-color: var(--infobox-header);
            text-align: center;
            font-weight: bold;
            padding: 4px;
        }

        .infobox-table {
            width: 100%;
            border-collapse: collapse;
        }

        .infobox-table td {
            padding: 4px 6px;
            vertical-align: top;
            border-bottom: 1px solid var(--border-sub);
        }

        .infobox-label {
            font-weight: bold;
            width: 45%;
        }

        .infobox-sublabel {
            padding-left: 15px !important;
            font-weight: normal;
        }

        .infobox-data {
            width: 55%;
        }

        .trend-up { color: #00af89; font-weight: bold; }
        .trend-down { color: #d33d33; font-weight: bold; }
        
        .idh-box {
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: #ffcc00;
            border: 1px solid #333;
            margin-right: 5px;
        }

        .wiki-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
            font-size: 13px;
        }

        .wiki-table th {
            background-color: var(--bg-main);
            border: 1px solid var(--border-wiki);
            padding: 8px;
            font-weight: bold;
            text-align: left;
        }

        .wiki-table td {
            border: 1px solid var(--border-wiki);
            padding: 7px;
        }

        .wiki-table tr:hover {
            background-color: #f8f9fa;
        }

        .party-bar-container {
            background-color: #eee;
            border-radius: 2px;
            width: 100%;
            height: 12px;
            display: inline-block;
        }

        .party-bar {
            height: 100%;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-brand">
            <svg height="24" viewBox="0 0 24 24" width="24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
            <h1>WikiCelania</h1>
        </div>
        <div class="search-box">
            <input type="text" placeholder="Buscar en WikiCelania">
        </div>
    </header>

    <div class="container">
        <nav class="sidebar">
            <ul>
                <li><a href="#">Portada</a></li>
                <li><a href="#historia">Historia</a></li>
                <li><a href="#gobierno">Gobierno y política</a></li>
                <li><a href="#elecciones">Elecciones generales</a></li>
                <li><a href="#cultura">Cultura</a></li>
            </ul>
        </nav>
